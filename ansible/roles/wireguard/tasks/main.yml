---
- name: Create NAS shares group
  group:
    name: nas_shares
    gid: 10000
    state: present

- name: Create Wireguard group
  group:
    name: wireguard
    state: present

- name: Create Wireguard user
  user:
    name: wireguard
    uid: 1000
    groups:
      - wireguard
      - nas_shares
    shell: /sbin/nologin
    append: true
    state: present
    create_home: false

- name: Install packages
  apt:
    pkg:
      - curl
      - wireguard
    state: latest

- name: Enable IP forwarding
  lineinfile:
    path: /etc/sysctl.conf
    regexp: "^#net.ipv4.ip_forward=1"
    line: net.ipv4.ip_forward=1
  register: ip_forwarding_enabled

- name: Reload sysctl file
  when: ip_forwarding_enabled.changed
  command:
    argv:
      - sysctl
      - -p
  notify:
    - Shutdown LXC
    