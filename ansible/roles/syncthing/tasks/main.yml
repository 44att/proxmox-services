- name: Add the Syncthing APT release key
  apt_key:
    url: https://syncthing.net/release-key.gpg
    keyring: /etc/apt/trusted.gpg.d/syncthing-archive-keyring.gpg
    state: present

- name: Add the Syncthing repository
  apt_repository:
    repo: deb https://apt.syncthing.net/ syncthing stable
    filename: syncthing
    state: present

- name: Create systemd service directory
  file:
    path: /etc/systemd/system/syncthing@syncthing.service.d
    state: directory
    mode: 0755
    
- name: Copy systemd service file to server
  template:
    src: syncthing@syncthing.service.d/override.conf.j2
    dest: /etc/systemd/system/syncthing@syncthing.service.d/override.conf
    owner: root
    group: root
    mode: 0744
  notify:
    - Restart Syncthing

- name: Install syncthing package
  apt:
    pkg:
      - syncthing
    state: latest
  notify:
    - Restart Syncthing

