---
- name: Create Syncthing group
  group:
    name: syncthing
    gid: 10000
    state: present

- name: Create Syncthing user
  user:
    name: syncthing
    uid: 1000
    groups: syncthing
    shell: /sbin/nologin
    append: true
    state: present
    create_home: false

- name: Install required packages
  apt:
    pkg:
      - gnupg
    state: latest

