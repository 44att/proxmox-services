---
- name: Create Plex group
  group:
    name: plex
    gid: 10000
    state: present

- name: Create Plex user
  user:
    name: plex
    uid: 1000
    groups: plex
    shell: /sbin/nologin
    append: true
    state: present
    create_home: false

- name: Install packages
  apt:
    pkg:
      - gnupg2
      - curl
    state: latest

- name: Create Plex directory if it does not exist
  file:
    path: /var/lib/plexmediaserver
    state: directory
    mode: 0755

- name: Add Plex repository key
  apt_key:
    url: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
    state: present
  register: status_plex_repo

- name: Add the Plex repository
  apt_repository:
    repo: deb https://repo.plex.tv/deb/ public main
    state: present
  register: status_plex_repo

- name: Synchronize Plex config from backup source
  synchronize:
    src: "/Plex-data/"
    dest: "/var/lib/plexmediaserver"
    rsync_opts:
      - "--exclude=Cache/"
  delegate_to: "{{ inventory_hostname }}"

- name: Install Plex Server
  apt:
    name: plexmediaserver
    state: present
    update_cache: "{{ status_plex_repo.changed }}"
  notify:
    - Start Plex

- name: Recursively change ownership of Plex directory
  file:
    path: /var/lib/plexmediaserver/
    state: directory
    recurse: true
    owner: plex
    group: plex
  notify:
    - Restart Plex

- name: Remove old cron job if it exists
  cron:
    name: "backup plex"
    state: absent

- name: Create backup cron job
  cron:
    name: "backup plex"
    weekday: "*"
    minute: "*/30"
    hour: "*"
    job: "rsync -qauzog --exclude=Cache/ /var/lib/plexmediaserver/ /Plex-data"
