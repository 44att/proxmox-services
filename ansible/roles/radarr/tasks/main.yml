---
- name: Create Radarr group
  group:
    name: radarr
    gid: 10000
    state: present

- name: Create Radarr user
  user:
    name: radarr
    uid: 1000
    groups: radarr
    shell: /sbin/nologin
    append: true
    state: present
    create_home: false

- name: Install packages
  apt:
    pkg:
      - curl
      - mediainfo
      - sqlite3
    state: latest

- name: Create Radarr directory if it does not exist
  file:
    path: /var/lib/radarr
    state: directory
    mode: 0755

- name: Install Radarr
  unarchive:
    src: https://github.com/Radarr/Radarr/releases/download/v6.1.1.10360/Radarr.master.6.1.1.10360.linux-core-x64.tar.gz
    dest: /opt/
    remote_src: true

- name: Synchronize Radarr config from backup source
  synchronize:
    src: "/Radarr-data/"
    dest: "/var/lib/radarr/"
  delegate_to: "{{ inventory_hostname }}"

- name: Recursively change ownership of Radarr directory
  file:
    path: "{{ item }}"
    state: directory
    recurse: true
    owner: radarr
    group: radarr
  loop:
    - /opt/Radarr
    - /var/lib/radarr

- name: Copy systemd service file to server
  copy:
    src: radarr.service
    dest: /etc/systemd/system
    owner: root
    group: root
  notify:
    - Start Radarr

- name: Remove old cron job if it exists
  cron:
    name: "backup radarr"
    state: absent

- name: Create backup cron job
  cron:
    name: "backup radarr"
    weekday: "*"
    minute: "*/30"
    hour: "*"
    job: "rsync -qauzog /var/lib/radarr/ /Radarr-data"
